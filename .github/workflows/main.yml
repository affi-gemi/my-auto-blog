name: Auto Blog Writer

on:
  schedule:
    # 毎日朝7時（日本時間）に自動で実行する設定です
    - cron: '0 22 * * *'
  workflow_dispatch: # 手動で今すぐ動かすボタン

jobs:
  write-blog:
    runs-on: ubuntu-latest
    steps:
      - name: お店を開く準備
        uses: actions/checkout@v4

      - name: Geminiに記事を書かせる
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          PROMPT="あなたは優秀なアフィリエイトブロガーです。今おすすめの便利な最新ガジェットについて、読者が欲しくなるような魅力的なブログ記事を日本語のHTML形式（<body>の中身だけ、<h1>や<p>タグを使って綺麗に装飾して）で1本作成してください。記事の最後には、必ず『おすすめの商品はこちら：[ここにA8などの広告リンクを貼る]』という紹介を入れてください。"
          
          JSON_DATA=$(jq -n --arg prompt "$PROMPT" '{contents: [{parts: [{text: $prompt}]}]}')
          
          RESPONSE=$(curl -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent" \
            -H "Content-Type: application/json" \
            -H "x-goog-api-key: ${GEMINI_API_KEY}" \
            -d "$JSON_DATA")
          
          ARTICLE_HTML=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text')
          ARTICLE_HTML=$(echo "$ARTICLE_HTML" | sed -e 's/^```html//' -e 's/^```//' -e 's/```$//')

          # 日本時間の日付とタイトル用の文字を作ります
          export TZ="Asia/Tokyo"
          DATE=$(date '+%Y-%m-%d_%H-%M')
          TITLE_DATE=$(date '+%Y年%m月%d日')
          
          # 過去の記事を溜めるためのフォルダーを作ります
          mkdir -p posts
          
          # 今回の記事を「日付の名前」で保存します
          cat <<EOF > posts/${DATE}.html
          <!DOCTYPE html>
          <html lang="ja">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>${TITLE_DATE}のおすすめ記事</title>
              <style>
                  body { font-family: sans-serif; line-height: 1.8; max-width: 800px; margin: 0 auto; padding: 20px; background: #f5f5f5; color: #333; }
                  .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
                  h1 { color: #1a73e8; border-bottom: 3px solid #1a73e8; padding-bottom: 10px; font-size: 28px; }
                  h2 { color: #202124; margin-top: 40px; border-left: 5px solid #1a73e8; padding-left: 10px; }
                  p { margin-bottom: 20px; }
                  .back-link { display: inline-block; margin-top: 30px; color: #1a73e8; text-decoration: none; }
              </style>
          </head>
          <body>
              <div class="container">
                  <a href="../index.html" class="back-link">← 記事一覧（トップ）に戻る</a>
                  ${ARTICLE_HTML}
              </div>
          </body>
          </html>
          EOF

          # 溜まった記事の一覧（リンク集）を自動で作ります
          LINKS=""
          for file in $(ls -r posts/*.html 2>/dev/null); do
              filename=$(basename "$file" .html)
              display_name=$(echo "$filename" | sed -E 's/([0-9]{4})-([0-9]{2})-([0-9]{2})_([0-9]{2})-([0-9]{2})/\1年\2月\3日 \4:\5/')
              LINKS="${LINKS}<li><a href='posts/${filename}.html'>${display_name} のおすすめ記事</a></li>"
          done

          # トップページ（index.html）を新しく作り直してリンクを並べます
          cat <<EOF > index.html
          <!DOCTYPE html>
          <html lang="ja">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>AI自動生成・おすすめ情報ブログ</title>
              <style>
                  body { font-family: sans-serif; line-height: 1.8; max-width: 800px; margin: 0 auto; padding: 20px; background: #f5f5f5; color: #333; }
                  .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
                  h1 { color: #1a73e8; border-bottom: 3px solid #1a73e8; padding-bottom: 10px; font-size: 28px; }
                  ul { list-style: none; padding: 0; }
                  li { padding: 15px; border-bottom: 1px solid #eee; font-size: 18px; }
                  li a { color: #1a73e8; text-decoration: none; font-weight: bold; }
                  li a:hover { text-decoration: underline; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>AI自動生成・おすすめ情報ブログ</h1>
                  <p>毎日、最新のおすすめ情報をAIが自動で発信しています。</p>
                  <h2>記事一覧</h2>
                  <ul>
                      ${LINKS}
                  </ul>
              </div>
          </body>
          </html>
          EOF

      - name: 完成した記事をお店に公開する
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html posts/
          git commit -m "Geminiが自動で新しい記事を追加しました" || exit 0
          git push
