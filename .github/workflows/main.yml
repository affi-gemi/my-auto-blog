name: Auto Blog Writer

on:
  schedule:
    - cron: '0 22 * * *' # 毎日日本時間 朝7:00に自動実行
  workflow_dispatch: # 手動実行ボタン

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  write-blog:
    runs-on: ubuntu-latest

    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4

      - name: Python環境のセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: ブログ自動執筆システム
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
        run: |
          cat << 'EOF' > generate_blog.py
          import os
          import sys
          import datetime
          import urllib.parse
          import json
          import time
          import urllib.request
          import glob
          import re

          # 1. 曜日キーワード
          tz_ja = datetime.timezone(datetime.timedelta(hours=9))
          now_dt = datetime.datetime.now(tz_ja)
          weekday = now_dt.weekday()
          
          keywords = {
              6: "ふるさと納税 おすすめ 贅沢 返礼品",
              0: "プログラミング 初心者 教材",
              1: "Wi-Fiルーター 高速 おすすめ",
              2: "英会話 教材 初心者 おすすめ",
              3: "スキンケア 乾燥肌 敏感肌 人気 化粧品",
              4: "プロジェクター 小型 家庭用 おうち映画館",
              5: "スマート家電 おすすめ ガジェット"
          }
          keyword = keywords.get(weekday, "ガジェット おすすめ")
          print(f"検索キーワード: {keyword}")

          # 2. 楽天API接続
          app_id = "5e1e64aa-f0ff-4e9c-9dd1-d9d708d434d0"
          access_key = "pk_7Dvceb0JWiyKBHA4tjkjiO47cQm2Ku4DAgKbdZrGB7B"
          referer = "https://affi-gemi.github.io/my-auto-blog/"
          origin = "https://affi-gemi.github.io"
          affiliate_id = os.environ.get("RAKUTEN_AFFILIATE_ID", "").strip()
          
          encoded_keyword = urllib.parse.quote(keyword)
          rakuten_url = f"https://openapi.rakuten.co.jp/ichibams/api/IchibaItem/Search/20260401?format=json&applicationId={app_id}&accessKey={access_key}&affiliateId={affiliate_id}&keyword={encoded_keyword}&hits=1&sort=standard"
          
          req = urllib.request.Request(rakuten_url)
          req.add_header("User-Agent", "Mozilla/5.0")
          req.add_header("Referer", referer)
          req.add_header("Origin", origin)

          try:
              with urllib.request.urlopen(req) as res:
                  rakuten_data = json.loads(res.read().decode("utf-8"))
          except Exception as e:
              print(f"楽天API通信エラー: {e}")
              sys.exit(1)

          items = rakuten_data.get("Items", [])
          if not items:
              print("楽天APIから商品を取得できませんでした。")
              sys.exit(1)

          item = items[0]["Item"]
          item_title = item.get("itemName", "")
          item_url = item.get("affiliateUrl", "")
          item_price = item.get("itemPrice", "")
          item_caption = item.get("itemCaption", "")
          print(f"商品取得成功: {item_title}")

          # 広告リンクのパーツ化
          button_text = item_title[:28]
          link_html = f'<div style="text-align: center; margin: 50px 0;"><a href="{item_url}" target="_blank" rel="nofollow" class="cta-button"><span class="cta-sub">＼ 楽天市場で今すぐチェック！ ／</span><span class="cta-main">「{button_text}...」のリアルタイム価格を見る</span></a></div>'

          # 3. Gemini API 接続設定
          api_key = os.environ.get("GEMINI_API_KEY", "").strip()
          gemini_url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key={api_key}"

          def ask_gemini(prompt_text):
              payload = {"contents": [{"parts": [{"text": prompt_text}]}]}
              req_gemini = urllib.request.Request(
                  gemini_url, 
                  data=json.dumps(payload).encode("utf-8"), 
                  headers={"Content-Type": "application/json"}
              )
              with urllib.request.urlopen(req_gemini) as response:
                  res_data = json.loads(response.read().decode("utf-8"))
                  return res_data["candidates"][0]["content"]["parts"][0]["text"]

          # ─── 1回目：下書き ───
          prompt1 = f"紹介商品: {item_title}\n価格: {item_price}円\n説明: {item_caption}\n\n上記の商品1つだけに特化したプロのHTMLブログ記事を下書きしてください。末尾に必ず次のコードをそのまま貼ること: {link_html}"
          print("Gemini 1回目の下書きをリクエスト中...")
          try:
              draft = ask_gemini(prompt1)
              print("1回目の下書き生成に成功しました。")
          except Exception as e:
              print(f"Gemini 1回目でエラー: {e}")
              sys.exit(1)

          # ─── 💡 シンプルにここで60秒待たせる ───
          print("APIの1分間制限をクリアするため、ここで60秒間待機します...")
          time.sleep(60)

          # ─── 2回目：清書 ───
          prompt2 = f"以下のHTMLブログドラフトをプロの文章（です・ます調）に清書・推敲してください。余計な挨拶や解説文、マークダウン表記(```)などは一切出力せず、HTMLコードのみを出力してください。末尾の広告リンクは絶対に残してください。\n\n【ドラフト】\n{draft}"
          print("Gemini 2回目の清書・ブラッシュアップをリクエスト中...")
          try:
              final_article = ask_gemini(prompt2)
              print("2回目の清書に成功しました。")
          except Exception as e:
              print(f"Gemini 2回目でエラー（429）: {e}")
              sys.exit(1)

          # 成形処理
          final_article = final_article.replace("```html", "").replace("```", "").strip()

          title_match = re.search(r'<h1[^>]*>(.*?)</h1>', final_article)
          article_title = title_match.group(1) if title_match else f"{now_dt.strftime('%Y年%m月%d日')}のおすすめ商品"
          article_title = re.sub(r'<[^>]+>', '', article_title).strip()

          # 4. 保存処理
          now_str = now_dt.strftime("%Y-%m-%d_%H-%M")
          os.makedirs("posts", exist_ok=True)
          
          modern_style = "<style>body { font-family: sans-serif; line-height: 1.8; color: #333; background-color: #f8f9fa; padding: 40px 20px; }.container { max-width: 760px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }h1 { font-size: 28px; color: #111; }h2 { font-size: 22px; border-left: 6px solid #d93025; padding-left: 15px; }.review-box { background-color: #fff8f8; border: 1px solid #fadbd8; padding: 25px; border-radius: 8px; }.cta-button { display: inline-block; background: linear-gradient(135deg, #e53935 0%, #b71c1c 100%); color: #fff !important; text-decoration: none; padding: 15px 35px; border-radius: 50px; font-weight: bold; }.cta-sub { display: block; font-size: 12px; opacity: 0.8; }.cta-main { display: block; font-size: 18px; }.back-link { display: inline-block; margin-bottom: 20px; color: #d93025; text-decoration: none; font-weight: bold; }</style>"
          
          html_content = f"<!DOCTYPE html><html lang='ja'><head><meta charset='UTF-8'><title>{article_title}</title>{modern_style}</head><body><div class='container'><a href='../' class='back-link'>← トップページに戻る</a>{final_article}</div></body></html>"
          
          with open(f"posts/{now_str}.html", "w", encoding="utf-8") as f:
              f.write(html_content)

          # 5. インデックス更新
          print("index.htmlを更新中...")
          all_posts = sorted(glob.glob("posts/*.html"), reverse=True)
          links_html = ""
          for post_path in all_posts:
              filename = os.path.basename(post_path)
              try:
                  with open(post_path, "r", encoding="utf-8") as pf:
                      t_match = re.search(r'<title>(.*?)</title>', pf.read())
                      p_title = t_match.group(1) if t_match else filename
              except:
                  p_title = filename
              links_html += f'<li style="margin: 15px 0;"><span style="color:#777; margin-right:15px;">{filename[:10]}</span><a href="posts/{filename}" style="color:#111; font-weight:bold; text-decoration:none;">{p_title}</a></li>'

          index_content = f"<!DOCTYPE html><html lang='ja'><head><meta charset='UTF-8'><title>AI自動更新ブログ</title></head><body style='font-family:sans-serif; background:#f8f9fa; padding:40px 20px;'><div style='max-width:800px; margin:0 auto; background:#fff; padding:40px; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.05);'><h1 style='border-bottom:3px solid #d93025; padding-bottom:15px;'>毎日自動更新！おすすめトレンド商品レビュー</h1><ul style='list-style:none; padding:0;'>{links_html}</ul></div></body></html>"
          
          with open("index.html", "w", encoding="utf-8") as f:
              f.write(index_content)
              
          print("すべてのビルドが正常に完了しました。")
          EOF
          
          python generate_blog.py

      - name: GitHubレポジトリへのコミットとプッシュ
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/ index.html
          git commit -m "新着記事を追加" || exit 0
          git push

      - name: GitHub Pages のセットアップ
        uses: actions/configure-pages@v5

      - name: ページ資産のアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: サイトを強制公開（デプロイ）
        uses: actions/deploy-pages@v4
