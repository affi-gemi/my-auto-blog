この修正でどう変わるか？
1. Geminiが「構造」を理解する
以前は「ブログを書いて」だけだったので、AIは適当な文章の羅列を出力していました。
今回の修正により、AIは point-box（ポイントまとめ） や comparison（メリット・デメリット比較） といった特定のパーツに情報を当てはめるようになります。

2. CSSがパーツに命を吹き込む
Pythonコードに追加した modern_style（CSS）が、AIが生成した class="good" や class="point-box" に対して、以下のような装飾を自動で適用します。

タイトル: 下線が入り、フォントが綺麗になる。

ポイント: 青い背景のボックスにチェックマークが付く。

メリット・デメリット: 緑と赤の2カラムのカード形式で表示される（スマホでは縦に並ぶ）。

ボタン: グラデーションがかかり、立体感のある大きなボタンになる。

3. 2回目の「清書」での品質維持
「HTML構造を壊すな」と強く指示することで、Geminiが文章を直す際、ついでに大事な <div> タグを消してしまうミスを防いでいます。

導入方法
現在お使いの .github/workflows/main.yml（または該当のymlファイル）を開き、generate_blog.py を作成している箇所の、プロンプト変数（prompt1, prompt2）と modern_style 変数の部分を上記の内容に差し替えてコミット・プッシュしてください。

改良版を組み込んだコードを出して

勿論、ほかの部分は弄らないで

承知いたしました。元のGitHub Actionsのワークフロー（YAML）の構造や、楽天API・Gemini APIの通信処理、1分間待機（time.sleep(60)）などのロジックには一切手を付けず、「デザイン（CSS）」と「Geminiへの指示文（プロンプト）」だけをオシャレなモダンデザイン用に差し替えた完全版のコードを作成しました。

このコードをそのままYAMLファイルに上書き貼り付け（ペースト）してご使用ください。

YAML
name: Auto Blog Writer

on:
  schedule:
    - cron: '0 21 * * *' # 日本時間 毎日朝7:00に自動実行（時差を修正済み）
  workflow_dispatch: # 手動実行ボタン

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  write-blog:
    runs-on: ubuntu-latest

    steps:
      - name: コードのチェックアウト
