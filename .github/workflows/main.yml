🔍 何が変わったのか？
狙ったキーワードを漏れなく含める指示
プログラムの冒頭で取得している曜日ごとのキーワード（例：「スキンケア 乾燥肌 敏感肌 人気 化粧品」）をGeminiに明示し、「これらをすべてタイトル（<h1>）に使いなさい」という強い命令（【SEOタイトル規則】）を足しました。

文字数を検索最適化
Googleの検索結果でタイトルが途中で途切れない上限である「30〜40文字」を目安に指定しました。

2回目の清書での保護
1回目でせっかく作ったSEO用の強力なタイトルを、2回目の文章推敲のタイミングでGeminiが勝手に「普通のシンプルなタイトル」に戻してしまわないよう、prompt2 に「タイトルはSEOキーワードが含まれているので大幅に変えるな」という防御の指示を追加しました。

なお、各種アプリのすべての機能を使用するには、Gemini アプリ アクティビティを有効にする必要があります。

