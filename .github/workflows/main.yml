name: Auto Blog Writer

on:
  schedule:
    - cron: '0 21 * * *' # 日本時間 毎日朝7:00に自動実行（時差を修正済み）
  workflow_dispatch: # 手動実行ボタン

permissions:
  contents: write
  pages: write
  id-token: write

