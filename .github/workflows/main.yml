name: Auto Blog Writer

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  write-blog:
    runs-on: ubuntu-latest
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4

      - name: 楽天APIの商品取得 ＆ Gemini 3.1 Proでの執筆・チェック
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APPLICATION_ID }}
          RAKUTEN_AFF_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
        run: |
          # 日本時間に設定
          export TZ="Asia/Tokyo"
          WEEKDAY=$(date +%w)

          case $WEEKDAY in
            0) KEYWORD="ふるさと納税 おすすめ 贅沢 返礼品" ;;
            1) KEYWORD="プログラミング 初心者 教材" ;;
            2) KEYWORD="Wi-Fiルーター 高速 おすすめ" ;;
            3) KEYWORD="英会話 教材 初心者 おすすめ" ;;
            4) KEYWORD="スキンケア 乾燥肌 敏感肌 人気 化粧品" ;;
            5) KEYWORD="プロジェクター 小型 家庭用 おうち映画館" ;;
            6) KEYWORD="スマート家電 おすすめ ガジェット" ;;
          esac

          ENCODED_KEYWORD=$(jq -rn --arg kw "$KEYWORD" '$kw | @uri')

          # 3. 楽天API呼び出しの確実な記述
          API_URL="https://app.rakuten.co.jp/services/api/IchibaItem/Search/20220601?format=json&applicationId=${RAKUTEN_APP_ID}&affiliateId=${RAKUTEN_AFF_ID}&keyword=${ENCODED_KEYWORD}&hits=1&sort=standard"
          RAKUTEN_RES=$(curl -s "${API_URL}")

          ITEM_TITLE=$(echo "$RAKUTEN_RES" | jq -r '.Items[0].Item.itemName // empty')
          
          if [ -z "$ITEM_TITLE" ]; then
            echo "--- 楽天APIからのレスポンスエラー詳細 ---"
            echo "$RAKUTEN_RES"
            echo "----------------------------------------"
            echo "楽天APIからの商品取得に失敗しました。設定を確認してください。"
            exit 1
          fi

          echo "商品取得成功！執筆を開始します。"
          # （※以下、執筆・投稿処理は元のコードの続きをそのまま残してください）
