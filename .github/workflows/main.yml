name: Auto Blog Writer

on:
  schedule:
    - cron: '0 22 * * *' # 毎日日本時間 朝7:00に自動実行
  workflow_dispatch: # 手動実行ボタン

jobs:
  write-blog:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4

      - name: Python環境のセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: ブログ自動執筆システム
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
        run: |
          cat << 'EOF' > generate_blog.py
          import os
          import sys
          import datetime
          import urllib.parse
          import json
          import time
          import urllib.request

          # 1. 曜日ごとのキーワード設定
          tz_ja = datetime.timezone(datetime.timedelta(hours=9))
          weekday = datetime.datetime.now(tz_ja).weekday()
          
          keywords = {
              6: "ふるさと納税 おすすめ 贅沢 返礼品", # 日
              0: "プログラミング 初心者 教材",        # 月
              1: "Wi-Fiルーター 高速 おすすめ",       # 火
              2: "英会話 教材 初心者 おすすめ",       # 水
              3: "スキンケア 乾燥肌 敏感肌 人気 化粧品", # 木
              4: "プロジェクター 小型 家庭用 おうち映画館", # 金
              5: "スマート家電 おすすめ ガジェット"     # 土
          }
          keyword = keywords.get(weekday, "ガジェット おすすめ")
          print(f"検索キーワード: {keyword}")

          # 2. 楽天APIリクエスト
          app_id = "5e1e64aa-f0ff-4e9c-9dd1-d9d708d434d0"
          access_key = "pk_7Dvceb0JWiyKBHA4tjkjiO47cQm2Ku4DAgKbdZrGB7B"
          referer = "https://affi-gemi.github.io/my-auto-blog/"
          origin = "https://affi-gemi.github.io"
          affiliate_id = os.environ.get("RAKUTEN_AFFILIATE_ID", "")
          encoded_keyword = urllib.parse.quote(keyword)

          rakuten_url = f"https://openapi.rakuten.co.jp/ichibams/api/IchibaItem/Search/20260401?format=json&applicationId={app_id}&accessKey={access_key}&affiliateId={affiliate_id}&keyword={encoded_keyword}&hits=1&sort=standard"
          
          req = urllib.request.Request(rakuten_url)
          req.add_header("User-Agent", "Mozilla/5.0")
          req.add_header("Referer", referer)
          req.add_header("Origin", origin)

          try:
              with urllib.request.urlopen(req) as res:
                  rakuten_data = json.loads(res.read().decode("utf-8"))
          except Exception as e:
              print(f"楽天API通信エラー: {e}")
              sys.exit(1)

          items = rakuten_data.get("Items", [])
          if not items:
              print("楽天APIから商品を取得できませんでした。")
              sys.exit(1)

          item = items[0]["Item"]
          item_title = item.get("itemName", "")
          item_url = item.get("affiliateUrl", "")
          item_price = item.get("itemPrice", "")
          item_caption = item.get("itemCaption", "")

          print(f"商品取得成功: {item_title}")

          # HTML形式の専用リンクボタンを正確に生成
          button_text = item_title[:30]
          link_html = f"<p style='text-align: center; margin: 40px 0;'><a href='{item_url}' target='_blank' rel='nofollow' style='background: #d93025; color: white; padding: 18px 35px; text-decoration: none; border-radius: 8px; font-weight: bold; display: inline-block; font-size: 20px; box-shadow: 0 4px 15px rgba(217,48,37,0.3);'>【楽天市場】「{button_text}...」の現在の価格をチェックする</a></p>"

          # 3. Gemini API 共通送信関数
          api_key = os.environ.get("GEMINI_API_KEY", "").strip()
          gemini_url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key={api_key}"

          def ask_gemini(prompt_text):
              payload = {"contents": [{"parts": [{"text": prompt_text}]}]}
              req_gemini = urllib.request.Request(
                  gemini_url, 
                  data=json.dumps(payload).encode("utf-8"), 
                  headers={"Content-Type": "application/json"}
              )
              with urllib.request.urlopen(req_gemini) as response:
                  res_data = json.loads(response.read().decode("utf-8"))
                  return res_data["candidates"][0]["content"]["parts"][0]["text"]

          # ─── 1回目：下書き執筆 ───
          prompt1 = f"""高度なマーケティングスキルを持つプロのWebライターとして、提供された【特定の1商品のみ】にスポットを当て、読者を惹きつける魅力的なHTMLブログ記事を1本執筆してください。
          無関係な他の商品や、複数の商品を勝手に並べることは絶対に禁止します。

          【執筆時の絶対ルール】
          1. ターゲット商品に特化する：紹介する商品は、以下に提供する「商品名」の商品ただ1つのみです。
          2. 著作権の侵害を完全に防ぐ：提供された「商品説明（CAPTION）」の文章をそのまま丸写しすることは厳禁です。スペックや特徴を正しく理解した上で、完全にあなた自身の言葉、独自の切り口で魅力的な紹介文へとリライトしてください。
          3. ベネフィットを伝える：単なる機能の箇取りではなく、「この商品を購入することで、読者の生活がどう快適になるか、どんな悩みが解決するか」を感情に訴えかける文章（シズル感のある表現）で書いてください。
          4. 構成：HTMLのタグ（h2, h3, pなど）を使って、見出しのある読みやすいブログ記事にしてください。

          【提供された商品情報】
          商品名: {item_title}
          価格: {item_price}円
          商品説明: {item_caption}

          【重要・広告リンクの設置】
          記事の最後（まとめの後）に、必ず以下のHTMLリンクコードを、文字一つ変えずにそのまま配置して記事を締めくくってください。ダミーのテキストリンク等に置き換えることは絶対に禁止します。
          {link_html}
          """

          print("Gemini 1回目の下書きをリクエスト中...")
          try:
              draft = ask_gemini(prompt1)
          except Exception as e:
              print(f"Gemini 1回目でエラー: {e}")
              sys.exit(1)

          print("1回目の下書きに成功しました。60秒待機します...")
          time.sleep(60)

          # ─── 2回目：純粋な推敲・校正（余計な台詞を完全禁止するプロンプト） ───
          prompt2 = f"""あなたはプロのWebディレクターおよび校正担当者です。
          提供されたブログ記事（HTMLドラフト）の文章を精査し、より商業的に魅力が高く、不自然なコピペ表現のない、洗練された最高品質の記事へブラッシュアップ（清書）してください。

          【ブラッシュアップの4大基準】
          1. 著作権・コピペチェック（元の商品説明の直接的な丸写し表現があれば、独創的で魅力的な表現へ書き直す）
          2. 購入意欲の最大化（シズル感を高め、読者が楽天市場で今すぐ買いたいと思える文章へブラッシュアップ）
          3. 文末の完全統一（記事全体の文末を「です・ます調」に完全統一する）
          4. 無関係な話題の削除（ターゲットである1商品以外の無関係な情報はすべて排除する）

          【⚠️出力に関する絶対厳守ルール】
          ・あなた自身のコメント、アドバイス、解説、自己紹介、挨拶、思考プロセスなどは【絶対に1文字も出力しないでください】。
          ・「以下に修正した記事を示します」や「修正ポイント」などの前置き・後書きも【完全に禁止】します。
          ・出力する内容は、ブラッシュアップが完了した【HTMLのブログ本文（タグ含むテキスト）のみ】としてください。
          ・末尾にある楽天市場への広告リンク（{link_html}）は、絶対に削除・改変せず、必ずそのまま最終出力の最末尾に残してください。

          【修正対象のHTMLドラフト】
          {draft}
          """

          print("Gemini 2回目の清書・ブラッシュアップをリクエスト中...")
          try:
              final_article = ask_gemini(prompt2)
          except Exception as e:
              print(f"Gemini 2回目でエラー: {e}")
              sys.exit(1)

          # クリーニング
          if final_article.startswith("```html"):
              final_article = final_article[7:]
          elif final_article.startswith("```"):
              final_article = final_article[3:]
          if final_article.endswith("```"):
              final_article = final_article[:-3]
          final_article = final_article.strip()

          # 4. ファイル保存
          now_str = datetime.datetime.now(tz_ja).strftime("%Y-%m-%d_%H-%M")
          title_str = datetime.datetime.now(tz_ja).strftime("%Y年%m月%d日")
          
          os.makedirs("posts", exist_ok=True)
          html_content = f"<!DOCTYPE html><html lang='ja'><head><meta charset='UTF-8'><title>{title_str}のおすすめ</title></head><body>{final_article}</body></html>"
          
          with open(f"posts/{now_str}.html", "w", encoding="utf-8") as f:
              f.write(html_content)
          
          print("余計なセリフを完全に排除した特化記事の生成が完了しました！")
          EOF
          
          python generate_blog.py

      - name: GitHubレポジトリへのコミットとプッシュ
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/
          git commit -m "新着記事を追加" || exit 0
          git push
