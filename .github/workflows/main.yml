name: Auto Blog Writer

on:
  schedule:
    # 毎日朝7時（日本時間）に自動で実行
    - cron: '0 22 * * *'
  workflow_dispatch: # 手動実行ボタン

jobs:
  write-blog:
    runs-on: ubuntu-latest
    steps:
      - name: お店を開く準備
        uses: actions/checkout@v4

      - name: Geminiに記事を書かせる
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # 日本時間に設定
          export TZ="Asia/Tokyo"
          WEEKDAY=$(date +%w) # 0=日, 1=月, 2=火, 3=水, 4=木, 5=金, 6=土

          # ⚠️【重要】「ここにあなたの楽天URL」の部分を、あなたの楽天アフィリエイトURLに書き換えてください！
          case $WEEKDAY in
            0)
              KEYWORD="ふるさと納税でおすすめの贅沢な返礼品"
              URL="https://rpx.a8.net/svt/ejp?a8mat=4B5PG8+H9LBM+2HOM+6C1VM&rakuten=y&a8ejpredirect=http%3A%2F%2Fhb.afl.rakuten.co.jp%2Fhgc%2F0ea62065.34400275.0ea62066.204f04c0%2Fa26060622363_4B5PG8_H9LBM_2HOM_6C1VM%3Fpc%3Dhttp%253A%252F%252Fwww.rakuten.co.jp%252F%26m%3Dhttp%253A%252F%252Fm.rakuten.co.jp%252F"
              TEXT="【楽天市場】ふるさと納税の人気の返礼品をチェックする"
              ;;
            1)
              KEYWORD="未経験から在宅ワークができるおすすめのプログラミング学習教材"
              URL="https://rpx.a8.net/svt/ejp?a8mat=4B5PG8+H9LBM+2HOM+6C1VM&rakuten=y&a8ejpredirect=http%3A%2F%2Fhb.afl.rakuten.co.jp%2Fhgc%2F0ea62065.34400275.0ea62066.204f04c0%2Fa26060622363_4B5PG8_H9LBM_2HOM_6C1VM%3Fpc%3Dhttp%253A%252F%252Fwww.rakuten.co.jp%252F%26m%3Dhttp%253A%252F%252Fm.rakuten.co.jp%252F"
              TEXT="【楽天市場】人気のプログラミング関連商品を見る"
              ;;
            2)
              KEYWORD="家での動画視聴が快適になるおすすめの高速Wi-Fiルーター・周辺機器"
              URL="https://rpx.a8.net/svt/ejp?a8mat=4B5PG8+H9LBM+2HOM+6C1VM&rakuten=y&a8ejpredirect=http%3A%2F%2Fhb.afl.rakuten.co.jp%2Fhgc%2F0ea62065.34400275.0ea62066.204f04c0%2Fa26060622363_4B5PG8_H9LBM_2HOM_6C1VM%3Fpc%3Dhttp%253A%252F%252Fwww.rakuten.co.jp%252F%26m%3Dhttp%253A%252F%252Fm.rakuten.co.jp%252F"
              TEXT="【楽天市場】売れ筋のWi-Fiルーターランキングを見る"
              ;;
            3)
              KEYWORD="初心者でも毎日続けられる人気の英会話教材・おすすめ参考書"
              URL="https://rpx.a8.net/svt/ejp?a8mat=4B5PG8+H9LBM+2HOM+6C1VM&rakuten=y&a8ejpredirect=http%3A%2F%2Fhb.afl.rakuten.co.jp%2Fhgc%2F0ea62065.34400275.0ea62066.204f04c0%2Fa26060622363_4B5PG8_H9LBM_2HOM_6C1VM%3Fpc%3Dhttp%253A%252F%252Fwww.rakuten.co.jp%252F%26m%3Dhttp%253A%252F%252Fm.rakuten.co.jp%252F"
              TEXT="【楽天市場】人気の英会話学習グッズをチェックする"
              ;;
            4)
              KEYWORD="乾燥肌・敏感肌に悩む人に今売れている人気のスキンケア化粧品"
              URL="https://rpx.a8.net/svt/ejp?a8mat=4B5PG8+H9LBM+2HOM+6C1VM&rakuten=y&a8ejpredirect=http%3A%2F%2Fhb.afl.rakuten.co.jp%2Fhgc%2F0ea62065.34400275.0ea62066.204f04c0%2Fa26060622363_4B5PG8_H9LBM_2HOM_6C1VM%3Fpc%3Dhttp%253A%252F%252Fwww.rakuten.co.jp%252F%26m%3Dhttp%253A%252F%252Fm.rakuten.co.jp%252F"
              TEXT="【楽天市場】大人気のスキンケア化粧品を見る"
              ;;
            5)
              KEYWORD="週末におうち映画館を楽しめるおすすめの最新プロジェクター・便利グッズ"
              URL="https://rpx.a8.net/svt/ejp?a8mat=4B5PG8+H9LBM+2HOM+6C1VM&rakuten=y&a8ejpredirect=http%3A%2F%2Fhb.afl.rakuten.co.jp%2Fhgc%2F0ea62065.34400275.0ea62066.204f04c0%2Fa26060622363_4B5PG8_H9LBM_2HOM_6C1VM%3Fpc%3Dhttp%253A%252F%252Fwww.rakuten.co.jp%252F%26m%3Dhttp%253A%252F%252Fm.rakuten.co.jp%252F"
              TEXT="【楽天市場】おうち時間を楽しむ便利グッズを見る"
              ;;
            6)
              KEYWORD="暮らしが劇的に便利になる最新のおすすめスマート家電・ガジェット"
              URL="https://rpx.a8.net/svt/ejp?a8mat=4B5PG8+H9LBM+2HOM+6C1VM&rakuten=y&a8ejpredirect=http%3A%2F%2Fhb.afl.rakuten.co.jp%2Fhgc%2F0ea62065.34400275.0ea62066.204f04c0%2Fa26060622363_4B5PG8_H9LBM_2HOM_6C1VM%3Fpc%3Dhttp%253A%252F%252Fwww.rakuten.co.jp%252F%26m%3Dhttp%253A%252F%252Fm.rakuten.co.jp%252F"
              TEXT="【楽天市場】売れ筋のスマート家電ランキングを見る"
              ;;
          esac

          # 本物のリンクの形（HTML）に組み立てます
          LINK="<p style='text-align: center; margin: 30px 0;'><a href='${URL}' target='_blank' rel='nofollow' style='background: #d93025; color: white; padding: 15px 30px; text-decoration: none; border-radius: 5px; font-weight: bold; display: inline-block;'>${TEXT}</a></p>"

          # Geminiへのお願い文（プロンプト）
          PROMPT="高度なマーケティングスキルを持つプロのブロガーとして行動してください。お題である『${KEYWORD}』について、読者の悩みを解決しつつ、自然に商品が欲しくなるような魅力的な解説記事を、日本語のHTML形式（<body>の中身だけ、<h1>や<h2>、<p>タグを使って綺麗に装飾して）で1本作成してください。ネット上の記事のコピーではなく、あなた自身のプロとしての意見を交えて書いてください。そして、記事の最後のまとめの後に、必ず次のコードを『改行や変更を一切加えずにそのまま』貼り付けてください：${LINK}"
          
          JSON_DATA=$(jq -n --arg prompt "$PROMPT" '{contents: [{parts: [{text: $prompt}]}]}')
          
          RESPONSE=$(curl -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent" \
            -H "Content-Type: application/json" \
            -H "x-goog-api-key: ${GEMINI_API_KEY}" \
            -d "$JSON_DATA")
          
          ARTICLE_HTML=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text')
          ARTICLE_HTML=$(echo "$ARTICLE_HTML" | sed -e 's/^```html//' -e 's/^```//' -e 's/```$//')

          DATE=$(date '+%Y-%m-%d_%H-%M')
          TITLE_DATE=$(date '+%Y年%m月%d日')
          
          mkdir -p posts
          
          # 記事の保存
          cat <<EOF > posts/${DATE}.html
          <!DOCTYPE html>
          <html lang="ja">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>${TITLE_DATE}のおすすめ記事</title>
              <style>
                  body { font-family: sans-serif; line-height: 1.8; max-width: 800px; margin: 0 auto; padding: 20px; background: #f5f5f5; color: #333; }
                  .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
                  h1 { color: #1a73e8; border-bottom: 3px solid #1a73e8; padding-bottom: 10px; font-size: 28px; }
                  h2 { color: #202124; margin-top: 40px; border-left: 5px solid #1a73e8; padding-left: 10px; font-size: 22px; }
                  p { margin-bottom: 20px; }
                  .back-link { display: inline-block; margin-bottom: 30px; color: #1a73e8; text-decoration: none; }
              </style>
          </head>
          <body>
              <div class="container">
                  <a href="../index.html" class="back-link">← 記事一覧（トップ）に戻る</a>
                  ${ARTICLE_HTML}
              </div>
          </body>
          </html>
          EOF

          # リンク集の自動作成
          LINKS=""
          for file in $(ls -r posts/*.html 2>/dev/null); do
              filename=$(basename "$file" .html)
              display_name=$(echo "$filename" | sed -E 's/([0-9]{4})-([0-9]{2})-([0-9]{2})_([0-9]{2})-([0-9]{2})/\1年\2月\3日/')
              LINKS="${LINKS}<li><a href='posts/${filename}.html'>${display_name} のおすすめ記事</a></li>"
          done

          # トップページの作成
          cat <<EOF > index.html
          <!DOCTYPE html>
          <html lang="ja">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>AI自動生成・おすすめ情報ブログ</title>
              <style>
                  body { font-family: sans-serif; line-height: 1.8; max-width: 800px; margin: 0 auto; padding: 20px; background: #f5f5f5; color: #333; }
                  .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
                  h1 { color: #1a73e8; border-bottom: 3px solid #1a73e8; padding-bottom: 10px; font-size: 28px; }
                  ul { list-style: none; padding: 0; }
                  li { padding: 15px; border-bottom: 1px solid #eee; font-size: 18px; }
                  li a { color: #1a73e8; text-decoration: none; font-weight: bold; }
                  li a:hover { text-decoration: underline; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>AI自動生成・おすすめ情報ブログ</h1>
                  <p>毎日、最新のおすすめ情報をAIが自動で発信しています。</p>
                  <h2>記事一覧</h2>
                  <ul>
                      ${LINKS}
                  </ul>
              </div>
          </body>
          </html>
          EOF

      - name: 完成した記事をお店に公開する
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html posts/
          git commit -m "Geminiが自動で新しい記事を追加しました" || exit 0
          git push
