name: Auto Blog Writer

on:
  schedule:
    - cron: '0 22 * * *' # 毎日日本時間 朝7:00に自動実行
  workflow_dispatch: # 手動実行ボタン

jobs:
  write-blog:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4

      - name: Python環境のセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: ブログ自動執筆システム
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
        run: |
          cat << 'EOF' > generate_blog.py
          import os
          import sys
          import datetime
          import urllib.parse
          import json
          import time
          import urllib.request
          import glob
          import re

          # 1. 曜日ごとのキーワード設定
          tz_ja = datetime.timezone(datetime.timedelta(hours=9))
          now_dt = datetime.datetime.now(tz_ja)
          weekday = now_dt.weekday()
          
          keywords = {
              6: "ふるさと納税 おすすめ 贅沢 返礼品", # 日
              0: "プログラミング 初心者 教材",        # 月
              1: "Wi-Fiルーター 高速 おすすめ",       # 火
              2: "英会話 教材 初心者 おすすめ",       # 水
              3: "スキンケア 乾燥肌 敏感肌 人気 化粧品", # 木
              4: "プロジェクター 小型 家庭用 おうち映画館", # 金
              5: "スマート家電 おすすめ ガジェット"     # 土
          }
          keyword = keywords.get(weekday, "ガジェット おすすめ")
          print(f"検索キーワード: {keyword}")

          # 2. 楽天APIリクエスト（実績のある安定版URL形式）
          app_id = "5e1e64aa-f0ff-4e9c-9dd1-d9d708d434d0"
          affiliate_id = os.environ.get("RAKUTEN_AFFILIATE_ID", "").strip()
          encoded_keyword = urllib.parse.quote(keyword)

          rakuten_url = f"https://app.rakuten.co.jp/services/api/IchibaItem/Search/20170426?format=json&applicationId={app_id}&affiliateId={affiliate_id}&keyword={encoded_keyword}&hits=1&sort=standard"
          
          req = urllib.request.Request(rakuten_url)
          req.add_header("User-Agent", "Mozilla/5.0")

          try:
              with urllib.request.urlopen(req) as res:
                  rakuten_data = json.loads(res.read().decode("utf-8"))
          except Exception as e:
              print(f"楽天API通信エラー: {e}")
              sys.exit(3)

          items = rakuten_data.get("Items", [])
          if not items:
              print("楽天APIから商品データを取得できませんでした。レスポンスを確認してください。")
              sys.exit(3)

          item = items[0]["Item"]
          item_title = item.get("itemName", "")
          item_url = item.get("affiliateUrl", "")
          item_price = item.get("itemPrice", "")
          item_caption = item.get("itemCaption", "")

          print(f"商品取得成功: {item_title}")

          # 広告リンクボタンの生成
          button_text = item_title[:28]
          link_html = f"""
          <div style="text-align: center; margin: 50px 0;">
              <a href="{item_url}" target="_blank" rel="nofollow" class="cta-button">
                  <span class="cta-sub">＼ 楽天市場で今すぐチェック！ ／</span>
                  <span class="cta-main">「{button_text}...」のリアルタイム価格を見る</span>
              </a>
          </div>
          """

          # 3. Gemini API 送信関数（503等のエラー時に10秒待って最大3回リトライする仕組み）
          api_key = os.environ.get("GEMINI_API_KEY", "").strip()
          gemini_url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key={api_key}"

          def ask_gemini_with_retry(prompt_text):
              payload = {"contents": [{"parts": [{"text": prompt_text}]}]}
              req_gemini = urllib.request.Request(
                  gemini_url, 
                  data=json.dumps(payload).encode("utf-8"), 
                  headers={"Content-Type": "application/json"}
              )
              
              for attempt in range(3):
                  try:
                      with urllib.request.urlopen(req_gemini) as response:
                          res_data = json.loads(response.read().decode("utf-8"))
                          return res_data["candidates"][0]["content"]["parts"][0]["text"]
                  except Exception as e:
                      if attempt < 2:
                          print(f"Gemini APIエラーが発生したため、10秒後に自動で再チャレンジします（試行 {attempt + 1}/3）: {e}")
                          time.sleep(10)
                      else:
                          print("3回リトライしましたがGemini APIに接続できませんでした。")
                          raise e

          # ─── 1回目：下書き執筆 ───
          prompt1 = f"""トップアフィリエイター兼プロのWebライターとして、提供された【特定の1商品のみ】にスポットを当て、読者を惹きつける洗練されたモダンなHTMLブログ記事を1本執筆してください。

          【執筆・デザインの絶対ルール】
          1. ターゲット商品に特化する：紹介する商品は、以下に提供する「商品名」の商品ただ1つのみです。無関係な商品の箇条書きは厳禁。
          2. コピペ厳禁＆シズル感：商品説明（CAPTION）の丸写しは絶対にNG。スペックを噛み砕き、読者の生活がどう豊かになるか（ベネフィット）を感情に訴えかける言葉で執筆してください。
          3. 洗練されたモダンデザイン：
             - 重要なポイントや箇条書きをする箇所は、必ず `<div class="review-box">` などの枠線ボックスで囲んで可視性を高めてください。
             - 見出し（h2, h3）や段落（p）を適切に使い、単調な文字の羅列を避けてください。
             - 記事の冒頭に、パッと目を引くキャッチーな「記事のタイトル（見出しではなく、シンプルな文字列またはh1）」を必ず1つ考えて配置してください。

          【提供された商品情報】
          商品名: {item_title}
          価格: {item_price}円
          商品説明: {item_caption}

          【重要・広告リンクの設置】
          記事の最後（まとめの後）に、必ず以下のHTMLリンクコードを、文字一つ変えずにそのまま配置して記事を締めくくってください。
          {link_html}
          """

          print("Gemini 1回目の下書きをリクエスト中...")
          try:
              draft = ask_gemini_with_retry(prompt1)
          except Exception as e:
              print(f"Gemini 1回目で致命的なエラー: {e}")
              sys.exit(3)

          print("1回目の下書きに成功しました。30秒待機して推敲に入ります...")
          time.sleep(30)

          # ─── 2回目：純粋な推敲・校正 ───
          prompt2 = f"""あなたはプロのWebディレクターです。提供されたブログ記事（HTMLドラフト）を最高品質に仕上げてください。

          【ブラッシュアップ基準】
          1. 徹底したコピペ排除と、エモーショナルな文章への昇華。
          2. 文末の完全統一（「です・ます調」に完全統一）。
          3. 記事の最上部に、魅力的で洗練されたタイトル（h1タグなど）が必ず存在することを確認・修正。

          【⚠️出力に関する絶対厳守ルール】
          ・あなた自身のコメント、解説、挨拶などは【絶対に1文字も出力しないでください】。
          ・出力する内容は、ブラッシュアップが完了した【HTMLのブログ本文（タグ含むテキスト）のみ】としてください。
          ・末尾にある楽天市場への広告リンク（{link_html}）は、絶対に削除・改変せず、必ずそのまま最終出力の最末尾に残してください。

          【修正対象のHTMLドラフト】
          {draft}
          """

          print("Gemini 2回目の清書・ブラッシュアップをリクエスト中...")
          try:
              final_article = ask_gemini_with_retry(prompt2)
          except Exception as e:
              print(f"Gemini 2回目で致命的なエラー: {e}")
              sys.exit(3)

          # クリーニング処理
          if final_article.startswith("```html"):
              final_article = final_article[7:]
          elif final_article.startswith("```"):
              final_article = final_article[3:]
          if final_article.endswith("```"):
              final_article = final_article[:-3]
          final_article = final_article.strip()

          # タイトルの抽出（インデックス用）
          title_match = re.search(r'<h1[^>]*>(.*?)</h1>', final_article)
          article_title = title_match.group(1) if title_match else f"{now_dt.strftime('%Y年%m月%d日')}のおすすめ商品"
          article_title = re.sub(r'<[^>]+>', '', article_title).strip()

          # 4. 個別記事ファイルの保存
          now_str = now_dt.strftime("%Y-%m-%d_%H-%M")
          
          modern_style = """
          <style>
              body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; line-height: 1.8; color: #333333; background-color: #f8f9fa; margin: 0; padding: 40px 20px; }
              .container { max-width: 760px; margin: 0 auto; background: #ffffff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
              h1 { font-size: 28px; color: #111111; margin-bottom: 30px; line-height: 1.4; }
              h2 { font-size: 22px; position: relative; padding-left: 15px; border-left: 6px solid #d93025; color: #111111; margin-top: 40px; margin-bottom: 20px; }
              h3 { font-size: 18px; border-bottom: 2px solid #eaeaea; padding-bottom: 8px; color: #222222; margin-top: 30px; }
              p { margin-bottom: 24px; font-size: 16px; }
              .review-box { background-color: #fff8f8; border: 1px solid #fadbd8; border-radius: 8px; padding: 25px; margin: 30px 0; }
              .cta-button {
                  display: inline-block;
                  background: linear-gradient(135deg, #e53935 0%, #b71c1c 100%);
                  color: #ffffff !important;
                  text-decoration: none !important;
                  padding: 15px 35px;
                  border-radius: 50px;
                  font-weight: bold;
                  box-shadow: 0 6px 20px rgba(229,57,53,0.4);
                  transition: all 0.3s ease;
                  max-width: 90%;
              }
              .cta-button:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(229,57,53,0.5); }
              .cta-sub { display: block; font-size: 12px; margin-bottom: 4px; color: #ffcdd2; }
              .cta-main { display: block; font-size: 18px; }
              .back-link { display: inline-block; margin-bottom: 20px; color: #d93025; text-decoration: none; font-weight: bold; }
          </style>
          """
          
          os.makedirs("posts", exist_ok=True)
          html_content = f"""<!DOCTYPE html>
          <html lang='ja'>
          <head>
              <meta charset='UTF-8'>
              <meta name='viewport' content='width=device-width, initial-scale=1.0'>
              <title>{article_title}</title>
              {modern_style}
          </head>
          <body>
              <div class="container">
                  <a href="../" class="back-link">← トップページに戻る</a>
                  {final_article}
              </div>
          </body>
          </html>"""
          
          with open(f"posts/{now_str}.html", "w", encoding="utf-8") as f:
              f.write(html_content)

          # ─── 5. トップページ(index.html)の自動生成・更新 ───
          print("トップページ(index.html)を自動生成中...")
          all_posts = sorted(glob.glob("posts/*.html"), reverse=True)
          
          links_html = ""
          for post_path in all_posts:
              filename = os.path.basename(post_path)
              try:
                  with open(post_path, "r", encoding="utf-8") as pf:
                      content = pf.read()
                      t_match = re.search(r'<title>(.*?)</title>', content)
                      p_title = t_match.group(1) if t_match else filename
              except:
                  p_title = filename
              
              date_prefix = filename[:10]
              links_html += f"""
              <li class="post-item">
                  <span class="post-date">{date_prefix}</span>
                  <a class="post-link" href="posts/{filename}">{p_title}</a>
              </li>
              """

          index_content = f"""<!DOCTYPE html>
          <html lang="ja">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>AIアフィリエイトブログ</title>
              <style>
                  body {{ font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; background-color: #f8f9fa; margin: 0; padding: 40px 20px; color: #333; }}
                  .container {{ max-width: 800px; margin: 0 auto; background: #ffffff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }}
                  h1 {{ font-size: 26px; text-align: center; color: #111; margin-bottom: 40px; border-bottom: 3px solid #d93025; padding-bottom: 15px; }}
                  .post-list {{ list-style: none; padding: 0; margin: 0; }}
                  .post-item {{ padding: 20px 0; border-bottom: 1px solid #eaeaea; display: flex; flex-direction: column; }}
                  @media(min-width: 600px) {{ .post-item {{ flex-direction: row; align-items: center; }} }}
                  .post-date {{ font-size: 14px; color: #777; margin-right: 20px; min-width: 100px; margin-bottom: 5px; }}
                  .post-link {{ font-size: 18px; color: #111; text-decoration: none; font-weight: bold; transition: color 0.2s ease; }}
                  .post-link:hover {{ color: #d93025; }}
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>毎日自動更新！おすすめトレンド商品レビュー</h1>
                  <ul class="post-list">
                      {links_html}
                  </ul>
              </div>
          </body>
          </html>"""

          with open("index.html", "w", encoding="utf-8") as f:
              f.write(index_content)

          print("すべてのビルドが正常に完了しました！")
          EOF
          
          python generate_blog.py

      - name: GitHubレポジトリへのコミットとプッシュ
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/ index.html
          git commit -m "記事追加およびトップページ更新" || exit 0
          git push
