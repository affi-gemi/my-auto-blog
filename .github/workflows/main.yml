name: Auto Blog Writer

on:
  schedule:
    - cron: '0 22 * * *' # 毎日日本時間 朝7:00に自動実行
  workflow_dispatch: # 手動実行ボタン

jobs:
  write-blog:
    runs-on: ubuntu-latest

    # 自動実行時にGitHub Actionsがリポジトリに記事をプッシュできるようにする権限
    permissions:
      contents: write

    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4

      - name: 楽天APIの商品取得 ＆ Geminiでの執筆・チェック
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # 日本時間に設定
          export TZ="Asia/Tokyo"
          WEEKDAY=$(date +%w)

          case $WEEKDAY in
            0) KEYWORD="ふるさと納税 おすすめ 贅沢 返礼品" ;;
            1) KEYWORD="プログラミング 初心者 教材" ;;
            2) KEYWORD="Wi-Fiルーター 高速 おすすめ" ;;
            3) KEYWORD="英会話 教材 初心者 おすすめ" ;;
            4) KEYWORD="スキンケア 乾燥肌 敏感肌 人気 化粧品" ;;
            5) KEYWORD="プロジェクター 小型 家庭用 おうち映画館" ;;
            6) KEYWORD="スマート家電 おすすめ ガジェット" ;;
          esac

          echo "検索キーワード: ${KEYWORD}"

          # キーワードを安全にURL用の文字に変換（スペース対策）
          ENCODED_KEYWORD=$(echo -n "${KEYWORD}" | jq -sRr @uri)

          # ========================================================
          # 【重要】楽天APIの設定エリア
          # ========================================================
          # あなたの「アプリケーションID」
          APP_ID="5e1e64aa-f0ff-4e9c-9dd1-d9d708d434d0"

          # あなたの「アクセスキー」
          # ※★必ずご自身のアクセスキーに書き換えてください★
          ACCESS_KEY="pk_7Dvceb0JWiyKBHA4tjkjiO47cQm2Ku4DAgKbdZrGB7B"

          # 許可されたWebサイトのURL
          REFERER_URL="https://affi-gemi.github.io/my-auto-blog/"
          ORIGIN_URL="https://affi-gemi.github.io"
          
          # アフィリエイトID
          AFFILIATE_ID="${{ secrets.RAKUTEN_AFFILIATE_ID }}"
          # ========================================================

          # 楽天APIの呼び出し
          RAKUTEN_RES=$(curl -s -X GET -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" -H "Referer: ${REFERER_URL}" -H "Origin: ${ORIGIN_URL}" "https://openapi.rakuten.co.jp/ichibams/api/IchibaItem/Search/20260401?format=json&applicationId=${APP_ID}&accessKey=${ACCESS_KEY}&affiliateId=${AFFILIATE_ID}&keyword=${ENCODED_KEYWORD}&hits=1&sort=standard")

          # レスポンスから1件目の商品名を抽出
          ITEM_TITLE=$(echo "$RAKUTEN_RES" | jq -r '.Items[0].Item.itemName // empty')
          
          if [ -z "$ITEM_TITLE" ]; then
            echo "--- 楽天APIからのレスポンスエラー詳細 ---"
            echo "$RAKUTEN_RES"
            echo "----------------------------------------"
            echo "楽天APIからの商品取得に失敗しました。"
            exit 1
          fi

          echo "商品取得成功！執筆を開始します。: $ITEM_TITLE"

          # 記事作成に必要な残りの情報を抽出
          ITEM_URL=$(echo "$RAKUTEN_RES" | jq -r '.Items[0].Item.affiliateUrl // empty')
          ITEM_PRICE=$(echo "$RAKUTEN_RES" | jq -r '.Items[0].Item.itemPrice // empty')
          ITEM_CAPTION=$(echo "$RAKUTEN_RES" | jq -r '.Items[0].Item.itemCaption // empty')

          # 広告リンク（ボタン）の作成
          BUTTON_TEXT=$(echo "$ITEM_TITLE" | cut -c 1-30)
          LINK="<p style='text-align: center; margin: 40px 0;'><a href='${ITEM_URL}' target='_blank' rel='nofollow' style='background: #d93025; color: white; padding: 18px 35px; text-decoration: none; border-radius: 8px; font-weight: bold; display: inline-block; font-size: 20px; box-shadow: 0 4px 15px rgba(217,48,37,0.3);'>【楽天市場】「${BUTTON_TEXT}...」をチェックする</a></p>"

          # ========================================================
          # Gemini APIのキー整形（空白や改行の完全除去）
          # ========================================================
          CLEAN_GEMINI_KEY=$(echo -n "${GEMINI_API_KEY}" | tr -d '\r\n ')

          # Gemini API呼び出し (1回目: ドラフト作成)
          PROMPT_WRITE="高度なマーケティングスキルを持つプロのインフルエンサーとして、以下の商品について魅力的なHTML記事を書いてください。
          商品名: ${ITEM_TITLE}
          価格: ${ITEM_PRICE}円
          商品説明: ${ITEM_CAPTION}
          記事の最後に必ずこのリンクをHTMLタグごとそのまま末尾に貼ってください: ${LINK}"

          JSON_WRITE=$(jq -n --arg prompt "$PROMPT_WRITE" '{contents: [{parts: [{text: $prompt}]}]}')
          
          # 最新鋭の gemini-2.0-flash を安定の v1 URLで呼び出します
          RES_WRITE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1/models/gemini-2.0-flash:generateContent?key=${CLEAN_GEMINI_KEY}" -H "Content-Type: application/json" -d "$JSON_WRITE")
          
          # 応答からテキストを抽出
          DRAFT_ARTICLE=$(echo "$RES_WRITE" | jq -r '.candidates[0].content.parts[0].text // empty' | sed -e 's/^```html//' -e 's/^```//' -e 's/```$//')

          if [ -z "$DRAFT_ARTICLE" ]; then
            echo "--- Gemini API (1回目) エラーレスポンス詳細 ---"
            echo "$RES_WRITE"
            echo "---------------------------------------------"
            echo "Geminiでの下書き作成に失敗しました。上記のエラー内容を確認してください。"
            exit 1
          fi

          # Gemini API呼び出し (2回目: 推敲・チェック)
          PROMPT_CHECK="あなたは厳格な編集長です。以下の記事のドラフトを推敲し、より魅力的なHTML記事に仕上げてください。末尾のリンクは絶対に改変しないでください。
          【ドラフト】
          ${DRAFT_ARTICLE}"

          # 【バグ修正】閉じカッコの「}]}」を正しく修正しました
          JSON_CHECK=$(jq -n --arg prompt "$PROMPT_CHECK" '{contents: [{parts: [{text: $prompt}]}]}')
          
          # 2回目も gemini-2.0-flash で実行
          RES_CHECK=$(curl -s -X POST "[https://generativelanguage.googleapis.com/v1/models/gemini-2.0-flash:generateContent?key=$](https://generativelanguage.googleapis.com/v1/models/gemini-2.0-flash:generateContent?key=$){CLEAN_GEMINI_KEY}" -H "Content-Type: application/json" -d "$JSON_CHECK")
          
          # 最終テキストを抽出
          FINAL_ARTICLE=$(echo "$RES_CHECK" | jq -r '.candidates[0].content.parts[0].text // empty' | sed -e 's/^```html//' -e 's/^```//' -e 's/```$//')

          if [ -z "$FINAL_ARTICLE" ]; then
            echo "--- Gemini API (2回目) エラーレスポンス詳細 ---"
            echo "$RES_CHECK"
            echo "---------------------------------------------"
            echo "Geminiでの清書に失敗しました。"
            exit 1
          fi

          # ファイル保存処理
          DATE=$(date '+%Y-%m-%d_%H-%M')
          TITLE_DATE=$(date '+%Y年%m月%d日')
          mkdir -p posts
          
          # 安全に1行でHTMLを書き出し
          echo "<!DOCTYPE html><html lang='ja'><head><meta charset='UTF-8'><title>${TITLE_DATE}のおすすめ</title></head><body>${FINAL_ARTICLE}</body></html>" > posts/${DATE}.html

          # GitHubリポジトリへの自動コミット ＆ プッシュ
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/
          git commit -m "新着記事を追加" || exit 0
          git push
