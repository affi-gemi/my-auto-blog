name: Auto Blog Writer

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  write-blog:
    runs-on: ubuntu-latest
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4

      - name: 楽天APIの商品取得 ＆ Gemini 3.1 Proでの執筆・チェック
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APPLICATION_ID }}
          RAKUTEN_AFF_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
        run: |
          # 日本時間に設定
          export TZ="Asia/Tokyo"
          WEEKDAY=$(date +%w)

          case $WEEKDAY in
            0) KEYWORD="ふるさと納税 おすすめ 贅沢 返礼品" ;;
            1) KEYWORD="プログラミング 初心者 教材" ;;
            2) KEYWORD="Wi-Fiルーター 高速 おすすめ" ;;
            3) KEYWORD="英会話 教材 初心者 おすすめ" ;;
            4) KEYWORD="スキンケア 乾燥肌 敏感肌 人気 化粧品" ;;
            5) KEYWORD="プロジェクター 小型 家庭用 おうち映画館" ;;
            6) KEYWORD="スマート家電 おすすめ ガジェット" ;;
          esac

          echo "検索キーワード: ${KEYWORD}"

          # jqを使わず、curlの機能（-Gと-d）で安全にURLを組み立ててリクエストを送信
          RAKUTEN_RES=$(curl -s -G "https://app.rakuten.co.jp/services/api/IchibaItem/Search/20220601" \
            -d "format=json" \
            -d "applicationId=${RAKUTEN_APP_ID}" \
            -d "affiliateId=${RAKUTEN_AFF_ID}" \
            --data-urlencode "keyword=${KEYWORD}" \
            -d "hits=1" \
            -d "sort=standard")

          ITEM_TITLE=$(echo "$RAKUTEN_RES" | jq -r '.Items[0].Item.itemName // empty')
          
          if [ -z "$ITEM_TITLE" ]; then
            echo "--- 楽天APIからのレスポンスエラー詳細 ---"
            echo "$RAKUTEN_RES"
            echo "----------------------------------------"
            echo "楽天APIからの商品取得に失敗しました。"
            exit 1
          fi

          echo "商品取得成功！執筆を開始します。: $ITEM_TITLE"
          # （※以下、執筆・投稿処理は元のコードの続きをそのまま残してください）
