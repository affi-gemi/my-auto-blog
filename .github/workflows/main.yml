name: Auto Blog Writer

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  write-blog:
    runs-on: ubuntu-latest
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4

      - name: 楽天APIの商品取得 ＆ Gemini 3.1 Proでの執筆・チェック
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # 日本時間に設定
          export TZ="Asia/Tokyo"
          WEEKDAY=$(date +%w)

          case $WEEKDAY in
            0) KEYWORD="ふるさと納税 おすすめ 贅沢 返礼品" ;;
            1) KEYWORD="プログラミング 初心者 教材" ;;
            2) KEYWORD="Wi-Fiルーター 高速 おすすめ" ;;
            3) KEYWORD="英会話 教材 初心者 おすすめ" ;;
            4) KEYWORD="スキンケア 乾燥肌 敏感肌 人気 化粧品" ;;
            5) KEYWORD="プロジェクター 小型 家庭用 おうち映画館" ;;
            6) KEYWORD="スマート家電 おすすめ ガジェット" ;;
          esac

          echo "検索キーワード: ${KEYWORD}"

          # キーワードを安全にURL用の文字に変換（スペース対策）
          ENCODED_KEYWORD=$(echo -n "${KEYWORD}" | jq -sRr @uri)

          # ========================================================
          # 【重要】2026年最新仕様の入力エリア（ここを書き換えてください）
          # ========================================================
          # 1. あなたの「アプリケーションID」（そのままでOKです）
          APP_ID="5e1e64aa-f0ff-4e9c-9dd1-d9d708d434d0"

          # 2. あなたの「アクセスキー」
          # 楽天デベロッパーズの管理画面で、IDの近くにある「アクセスキー」をここに貼り付けてください
          ACCESS_KEY="pk_7Dvceb0JWiyKBHA4tjkjiO47cQm2Ku4DAgKbdZrGB7B"

          # 3. 許可されたWebサイトのURL
          # 楽天の管理画面の「アプリURL」に登録したURLを正確に入力してください
          REFERER_URL="https://affi-gemi.github.io/my-auto-blog/"
          # ========================================================

          # アフィリエイトIDはGitHub Secretsから読み込みます
          AFFILIATE_ID="${{ secrets.RAKUTEN_AFFILIATE_ID }}"

          # 改行エラーを完全に防ぐため、すべての命令を1行にまとめ、ヘッダーとして確実にURLを送信します
          RAKUTEN_RES=$(curl -s -H "Referer: ${REFERER_URL}" "https://openapi.rakuten.co.jp/ichibams/api/IchibaItem/Search/20260401?format=json&applicationId=${APP_ID}&accessKey=${ACCESS_KEY}&affiliateId=${AFFILIATE_ID}&keyword=${ENCODED_KEYWORD}&hits=1&sort=standard")

          # レスポンスから1件目の商品名を抽出
          ITEM_TITLE=$(echo "$RAKUTEN_RES" | jq -r '.Items[0].Item.itemName // empty')
          
          if [ -z "$ITEM_TITLE" ]; then
            echo "--- 楽天APIからのレスポンスエラー詳細 ---"
            echo "$RAKUTEN_RES"
            echo "----------------------------------------"
            echo "楽天APIからの商品取得に失敗しました。"
            exit 1
          fi

          echo "商品取得成功！執筆を開始します。: $ITEM_TITLE"
