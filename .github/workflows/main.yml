3. <div class="point-box">の中に「この記事の注目ポイント3選」を箇条書き(ul/li)で記載
4. <h2>タグで「実際に使うと生活がどう変わる？」という実用シーンを詳しく解説
5. <div class="comparison">の中に「メリット(class='comp-box good')」と「デメリット(class='comp-box bad')」の2つのボックスを配置して比較
6. 最後に、どんな人にこの商品がおすすめかをまとめる

末尾に必ず次のコードをそのまま貼ること: {link_html}
"""
print("Gemini 1回目の下書きをリクエスト中...")
try:
    draft = ask_gemini_with_retry(prompt1)
    print("1回目の下書き生成に成功しました。")
except Exception as e:
    print(f"Gemini 1回目で致命的エラー: {e}")
    sys.exit(1)

# ─── 💡 1回目成功後、次のリクエストのために確実に60秒空ける ───
print("APIの1分間制限（429）を確実にクリアするため、ここで60秒間待機します...")
time.sleep(60)

# ─── 2回目：清書 ───
prompt2 = f"""
以下のHTMLブログ下書きを、読者が読みやすいプロの文章（です・ます調）に清書・推敲してください。

【厳守事項】
・提供されたHTMLタグ（h1, h2, div class="point-box", div class="comparison", class="comp-box good", class="comp-box bad"等）の構造やクラス名は絶対に壊さず、そのまま維持してください。
・特に <h1> タグ内のタイトルは、SEOキーワードが含まれているため文章を大幅に変更しないでください。
・余計な挨拶や解説文、マークダウン表記(```)などは一切出力せず、<html>タグ等を含まない<body>内側のクリーンなHTMLコードのみを出力してください。
・末尾の広告リンクは絶対に残してください。

【ドラフト】
{draft}
"""
print("Gemini 2回目の清書・ブラッシュアップをリクエスト中...")
try:
    final_article = ask_gemini_with_retry(prompt2)
    print("2回目の清書に成功しました。")
except Exception as e:
    print(f"Gemini 2回目で致命的エラー: {e}")
    sys.exit(1)

# 成形処理
final_article = final_article.replace("```html", "").replace("```", "").strip()

title_match = re.search(r'<h1[^>]*>(.*?)</h1>', final_article)
article_title = title_match.group(1) if title_match else f"{now_dt.strftime('%Y年%m月%d日')}のおすすめ商品"
article_title = re.sub(r'<[^>]+>', '', article_title).strip()

# 4. 保存処理
now_str = now_dt.strftime("%Y-%m-%d_%H-%M")
os.makedirs("posts", exist_ok=True)

# 復活した完璧なモダンデザインCSS
modern_style = """
<style>
@import url('[https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap](https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap)');
body { font-family: 'Noto Sans JP', sans-serif; line-height: 1.8; color: #333; background-color: #f0f2f5; padding: 40px 20px; margin: 0; }
.container { max-width: 800px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
h1 { font-size: 26px; color: #1a1a1a; border-bottom: 4px solid #ffde59; padding-bottom: 10px; margin-bottom: 30px; }
h2 { font-size: 20px; position: relative; padding-left: 15px; border-left: 5px solid #ff914d; margin-top: 40px; }
.point-box { background: #eef9fe; border-left: 5px solid #38b6ff; padding: 20px; border-radius: 8px; margin: 25px 0; }
.point-box ul { padding-left: 20px; margin: 0; }
.point-box li { margin: 8px 0; }
.comparison { display: flex; gap: 20px; flex-wrap: wrap; margin: 25px 0; }
.comp-box { flex: 1; min-width: 280px; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
.good { background-color: #e8f5e9; border: 1px solid #c8e6c9; }
.bad { background-color: #ffebee; border: 1px solid #ffcdd2; }
.cta-button { display: block; background: linear-gradient(135deg, #ff914d 0%, #ff5757 100%); color: #fff !important; text-decoration: none; padding: 20px; border-radius: 12px; text-align: center; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 15px rgba(255,145,77,0.3); margin: 40px 0; }
.cta-button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,145,77,0.4); }
.cta-sub { display: block; font-size: 13px; margin-bottom: 5px; opacity: 0.9; }
.cta-main { font-size: 19px; }
.back-link { display: inline-block; margin-bottom: 25px; color: #ff914d; text-decoration: none; font-weight: bold; font-size: 14px; }
</style>
"""

html_content = f"<!DOCTYPE html><html lang='ja'><head><meta charset='UTF-8'><title>{article_title}</title>{modern_style}</head><body><div class='container'><a href='../' class='back-link'>← トップページに戻る</a>{final_article}</div></body></html>"

with open(f"posts/{now_str}.html", "w", encoding="utf-8") as f:
    f.write(html_content)

# 5. インデックス更新
print("index.htmlを更新中...")
all_posts = sorted(glob.glob("posts/*.html"), reverse=True)
links_html = ""
for post_path in all_posts:
    filename = os.path.basename(post_path)
    try:
        with open(post_path, "r", encoding="utf-8") as pf:
            t_match = re.search(r'<title>(.*?)</title>', pf.read())
            p_title = t_match.group(1) if t_match else filename
    except:
        p_title = filename
    links_html += f'<li style="margin: 15px 0;"><span style="color:#777; margin-right:15px;">{filename[:10]}</span><a href="posts/{filename}" style="color:#111; font-weight:bold; text-decoration:none;">{p_title}</a></li>'

index_content = f"<!DOCTYPE html><html lang='ja'><head><meta charset='UTF-8'><title>AI自動更新ブログ</title></head><body style='font-family:sans-serif; background:#f8f9fa; padding:40px 20px;'><div style='max-width:800px; margin:0 auto; background:#fff; padding:40px; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.05);'><h1 style='border-bottom:3px solid #d93025; padding-bottom:15px;'>毎日自動更新！おすすめトレンド商品レビュー</h1><ul style='list-style:none; padding:0;'>{links_html}</ul></div></body></html>"

with open("index.html", "w", encoding="utf-8") as f:
    f.write(index_content)
    
print("すべてのビルドが正常に完了しました。")
この2ステップに分けることで、GitHub Actions側の文字解析バグの干渉を完全に防ぎつつ、本来求めていた「リッチで最高に今風なデザイン」と「SEOに強いタイトル生成機能」を完璧に機能させることができます！

