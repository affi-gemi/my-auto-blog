記事のタイトルは検索に引っ掛かりやすいようにしたい

ブログへのアクセス数を増やすには、検索エンジン（SEO）を意識したタイトル作りが非常に重要です。特にAIが自動生成する場合、放っておくと「素晴らしい商品！○○のレビュー」といった抽象的なタイトルになりがちです。

Googleなどの検索に引っかかりやすくするためには、「具体的なターゲット（初心者、乾燥肌など）」「悩み・目的」「商品名」「感情（おすすめ、徹底解説など）」をタイトル内に自然に散りばめる必要があります。

元の処理やデザインは一切壊さず、1回目の下書きプロンプト（指示文）に「SEOに強いタイトル付けのルール」を厳格に組み込んだ修正版コードを作成しました。

