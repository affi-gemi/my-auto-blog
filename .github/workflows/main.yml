name: Auto Blog Writer

on:
  schedule:
    - cron: '0 21 * * *' # 日本時間 毎日朝7:00に自動実行
  workflow_dispatch: # 手動実行ボタン

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  write-blog:
    runs-on: ubuntu-latest

    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4

      - name: Python環境のセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: ブログ自動執筆システムを実行
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
        run: |
          cat << 'EOF' > generate_blog.py
          import os
          import sys
          import datetime
          import urllib.parse
          import json
          import time
          import urllib.request
          import glob
          import re

          # 1. 曜日キーワード
          tz_ja = datetime.timezone(datetime.timedelta(hours=9))
          now_dt = datetime.datetime.now(tz_ja)
          weekday = now_dt.weekday()

          keywords = {
              6: "ふるさと納税 おすすめ 贅沢 返礼品",
              0: "プログラミング 初心者 教材",
              1: "Wi-Fiルーター 高速 おすすめ",
              2: "英会話 教材 初心者 おすすめ",
              3: "スキンケア 乾燥肌 敏感肌 人気 化粧品",
              4: "プロジェクター 小型 家庭用 おうち映画館",
              5: "スマート家電 おすすめ ガジェット"
          }
          keyword = keywords.get(weekday, "ガジェット おすすめ")
          print(f"検索キーワード: {keyword}")

          # 2. 楽天API接続（400エラーを絶対に防ぐ安全なURLパラメーター構築）
          app_id = "5e1e64aa-f0ff-4e9c-9dd1-d9d708d434d0"
          access_key = "pk_7Dvceb0JWiyKBHA4tjkjiO47cQm2Ku4DAgKbdZrGB7B"
          referer = "https://affi-gemi.github.io/my-auto-blog/"
          origin = "https://affi-gemi.github.io"
          affiliate_id = os.environ.get("RAKUTEN_AFFILIATE_ID", "").strip()

          # スペース区切りの複数キーワードを楽天API仕様（+結合）に安全に変換
          params = {
              "format": "json",
              "applicationId": app_id,
              "accessKey": access_key,
              "affiliateId": affiliate_id,
              "keyword": keyword,
              "hits": 1,
              "sort": "standard"
          }
          # urlencodeを使うことで、スペースが自動的に「+」に変換され、400 Bad Requestが完全に防げます
          rakuten_url = f"https://openapi.rakuten.co.jp/ichibams/api/IchibaItem/Search/20170426?{urllib.parse.urlencode(params)}"

          req = urllib.request.Request(rakuten_url)
          req.add_header("User-Agent", "Mozilla/5.0")
          req.add_header("Referer", referer)
          req.add_header("Origin", origin)

          try:
              with urllib.request.urlopen(req) as res:
                  rakuten_data = json.loads(res.read().decode("utf-8"))
          except Exception as e:
              print(f"楽天API通信エラー: {e}")
              sys.exit(1)

          items = rakuten_data.get("Items", [])
          if not items:
              print("楽天APIから商品を取得できませんでした。")
              sys.exit(1)

          item = items[0]["Item"]
          item_title = item.get("itemName", "")
          item_url = item.get("affiliateUrl", "")
          item_price = item.get("itemPrice", "")
          item_caption = item.get("itemCaption", "")
          print(f"商品取得成功: {item_title}")

          # 広告リンクのパーツ化
          button_text = item_title[:28]
          link_html = f'<div style="text-align: center; margin: 50px 0;"><a href="{item_url}" target="_blank" rel="nofollow" class="cta-button"><span class="cta-sub">＼ 楽天市場で今すぐチェック！ ／</span><span class="cta-main">「{button_text}...」のリアルタイム価格を見る</span></a></div>'

          # 3. Gemini API 接続
          api_key = os.environ.get("GEMINI_API_KEY", "").strip()
          gemini_url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key={api_key}"

          def ask_gemini_with_retry(prompt_text, max_retries=4):
              payload = {"contents": [{"parts": [{"text": prompt_text}]}]}
              data_bytes = json.dumps(payload).encode("utf-8")
              for attempt in range(max_retries):
                  try:
                      req_gemini = urllib.request.Request(gemini_url, data=data_bytes, headers={"Content-Type": "application/json"})
                      with urllib.request.urlopen(req_gemini) as response:
                          res_data = json.loads(response.read().decode("utf-8"))
                          return res_data["candidates"][0]["content"]["parts"][0]["text"]
                  except Exception as e:
                      if attempt < max_retries - 1:
                          wait_time = 40 if "503" in str(e) else 60
                          print(f"Geminiエラー（{e}）。{wait_time}秒待機して自動リトライします...")
                          time.sleep(wait_time)
                      else:
                          raise e

          # ─── 1回目：下書き（YAMLエラーを避けるためPython内でパーツ結合） ───
          prompt1 = "紹介商品: " + item_title + "\n"
          prompt1 += "価格: " + str(item_price) + "円\n"
          prompt1 += "説明: " + item_caption + "\n"
          prompt1 += "本日の検索キーワード: " + keyword + "\n\n"
          prompt1 += "上記商品の紹介記事を、読者が欲しくなるWebブログ下書きとして作成してください。\n"
          prompt1 += "【SEOタイトル規則】\n"
          prompt1 += "・<h1>タグのタイトルには、検索キーワード（" + keyword + "）に含まれる単語を【必ずすべて】含めてください。\n"
          prompt1 += "・商品名（主要な部分）をタイトルに含め、30文字〜40文字程度で魅力的にしてください。\n\n"
          prompt1 += "【構成案】\n"
          prompt1 += "1. <h1>タグで上記のSEOタイトルを満たした記事タイトル\n"
          prompt1 += "2. 商品の概要や魅力を200文字程度で導入文として記載\n"
          prompt1 += "3. <div class='point-box'>の中に「注目ポイント3選」を箇条書き(ul/li)で記載\n"
          prompt1 += "4. <h2>タグで実用シーンを詳しく解説\n"
          prompt1 += "5. <div class='comparison'>の中に「メリット(class='comp-box good')」と「デメリット(class='comp-box bad')」の2つのボックスを配置して比較\n"
          prompt1 += "6. 最後に、どんな人にこの商品がおすすめかをまとめる\n\n"
          prompt1 += "末尾に必ず次のコードをそのまま貼ること: " + link_html

          print("Gemini 1回目の下書きをリクエスト中...")
          try:
              draft = ask_gemini_with_retry(prompt1)
              print("1回目の下書き生成に成功しました。")
          except Exception as e:
              print(f"Gemini 1回目で致命的エラー: {e}")
              sys.exit(1)

          print("API制限回避のため、ここで60秒間待機します...")
          time.sleep(60)

          # ─── 2回目：清書 ───
          prompt2 = "以下のHTMLブログ下書きを、読者が読みやすいプロの文章（です・ます調）に清書・推敲してください。\n\n"
          prompt2 += "【厳守事項】\n"
          prompt2 += "・提供されたHTMLタグ（h1, h2, div class='point-box', div class='comparison'など）の構造やクラス名は絶対に壊さず、そのまま維持してください。\n"
          prompt2 += "・余計な挨拶や解説文、マークダウン表記(```)などは一切出力せず、<body>内側のクリーンなHTMLコードのみを出力してください。\n"
          prompt2 += "・末尾の広告リンクは絶対に残してください。\n\n"
          prompt2 += "【ドラフト】\n" + draft

          print("Gemini 2回目の清書・ブラッシュアップをリクエスト中...")
          try:
              final_article = ask_gemini_with_retry(prompt2)
              print("2回目の清書に成功しました。")
          except Exception as e:
              print(f"Gemini 2回目で致命的エラー: {e}")
              sys.exit(1)

          final_article = final_article.replace("```html", "").replace("```", "").strip()

          title_match = re.search(r'<h1[^>]*>(.*?)</h1>', final_article)
          article_title = title_match.group(1) if title_match else f"{now_dt.strftime('%Y年%m月%d日')}のおすすめ商品"
          article_title = re.sub(r'<[^>]+>', '', article_title).strip()

          # 4. 保存処理
          now_str = now_dt.strftime("%Y-%m-%d_%H-%M")
          os.makedirs("posts", exist_ok=True)

          modern_style = "<style>"
          modern_style += "@import url('[https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap](https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap)');"
          modern_style += "body { font-family: 'Noto Sans JP', sans-serif; line-height: 1.8; color: #333; background-color: #f0f2f5; padding: 40px 20px; margin: 0; }"
          modern_style += ".container { max-width: 800px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }"
          modern_style += "h1 { font-size: 26px; color: #1a1a1a; border-bottom: 4px solid #ffde59; padding-bottom: 10px; margin-bottom: 30px; }"
          modern_style += "h2 { font-size: 20px; position: relative; padding-left: 15px; border-left: 5px solid #ff914d; margin-top: 40px; }"
          modern_style += ".point-box { background: #eef9fe; border-left: 5px solid #38b6ff; padding: 20px; border-radius: 8px; margin: 25px 0; }"
          modern_style += ".point-box ul { padding-left: 20px; margin: 0; } .point-box li { margin: 8px 0; }"
          modern_style += ".comparison { display: flex; gap: 20px; flex-wrap: wrap; margin: 25px 0; }"
          modern_style += ".comp-box { flex: 1; min-width: 280px; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }"
          modern_style += ".good { background-color: #e8f5e9; border: 1px solid #c8e6c9; } .bad { background-color: #ffebee; border: 1px solid #ffcdd2; }"
          modern_style += ".cta-button { display: block; background: #ff914d; color: #fff; text-decoration: none; padding: 20px; border-radius: 12px; text-align: center; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 15px rgba(255,145,77,0.3); margin: 40px 0; }"
          modern_style += ".cta-button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,145,77,0.4); }"
          modern_style += ".cta-sub { display: block; font-size: 13px; margin-bottom: 5px; opacity: 0.9; } .cta-main { font-size: 19px; }"
          modern_style += ".back-link { display: inline-block; margin-bottom: 25px; color: #ff914d; text-decoration: none; font-weight: bold; font-size: 14px; }"
          modern_style += "</style>"

          html_content = f"<!DOCTYPE html><html lang='ja'><head><meta charset='UTF-8'><title>{article_title}</title>{modern_style}</head><body><div class='container'><a href='../' class='back-link'>← トップページに戻る</a>{final_article}</div></body></html>"

          with open(f"posts/{now_str}.html", "w", encoding="utf-8") as f:
              f.write(html_content)

          # 5. インデックス更新
          print("index.htmlを更新中...")
          all_posts = sorted(glob.glob("posts/*.html"), reverse=True)
          links_html = ""
          for post_path in all_posts:
              filename = os.path.basename(post_path)
              try:
                  with open(post_path, "r", encoding="utf-8") as pf:
                      t_match = re.search(r'<title>(.*?)</title>', pf.read())
                      p_title = t_match.group(1) if t_match else filename
              except:
                  p_title = filename
              links_html += f'<li style="margin: 15px 0;"><span style="color:#777; margin-right:15px;">{filename[:10]}</span><a href="posts/{filename}" style="color:#111; font-weight:bold; text-decoration:none;">{p_title}</a></li>'

          index_content = f"<!DOCTYPE html><html lang='ja'><head><meta charset='UTF-8'><title>AI自動更新ブログ</title></head><body style='font-family:sans-serif; background:#f8f9fa; padding:40px 20px;'><div style='max-width:800px; margin:0 auto; background:#fff; padding:40px; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.05);'><h1 style='border-bottom:3px solid #d93025; padding-bottom:15px;'>毎日自動更新！おすすめトレンド商品レビュー</h1><ul style='list-style:none; padding:0;'>{links_html}</ul></div></body></html>"

          with open("index.html", "w", encoding="utf-8") as f:
              f.write(index_content)
          print("すべてのビルドが正常に完了しました。")
          EOF

          python generate_blog.py

      - name: GitHubレポジトリへのコミットとプッシュ
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/ index.html
          git commit -m "新着記事を追加" || exit 0
          git push

      - name: GitHub Pages のセットアップ
        uses: actions/configure-pages@v5

      - name: ページ資産のアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: サイトを強制公開（デプロイ）
        uses: actions/deploy-pages@v4
